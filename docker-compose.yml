version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest # Using pgvector-ready image
    restart: always
    environment:
      - POSTGRES_USER=n8n_user
      - POSTGRES_PASSWORD=n8n_password
      - POSTGRES_DB=n8n_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatbot_network

  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Asia/Taipei
      - TZ=Asia/Taipei
      - WEBHOOK_URL=https://your-domain.com/ # Replace with your actual public URL
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n_db
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=n8n_user
      - DB_POSTGRESDB_PASSWORD=n8n_password
    volumes:
      - n8n_storage:/home/node/.n8n
    depends_on:
      - postgres
    networks:
      - chatbot_network

networks:
  chatbot_network:
    driver: bridge

volumes:
  n8n_storage:
  postgres_data:
